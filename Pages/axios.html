<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Könyvek kezelése</title>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<style>
body {
    background: #2b2b2b;
    font-family: Arial;
    margin: 0;
    color: white;
}

.home-btn {
    text-align: center;
    margin-top: 20px;
}

.home-btn a {
    display: inline-block;
    padding: 12px 25px;
    border: 2px solid #ff9800;
    border-radius: 25px;
    color: #ff9800;
    text-decoration: none;
    font-size: 18px;
}

.home-btn a:hover {
    background: #ff9800;
    color: black;
}

.container {
    width: 90%;
    max-width: 1000px;
    margin: 30px auto;
    background: #3a3a3a;
    padding: 20px;
    border-radius: 15px;
    border: 2px solid #ff9800;
}

h1 {
    text-align: center;
    color: #ff9800;
}

input {
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
    border: 2px solid #ff9800;
    background: transparent;
    color: white;
}

button {
    padding: 10px 20px;
    margin: 10px;
    border-radius: 10px;
    border: 2px solid #ff9800;
    background: transparent;
    color: #ff9800;
    cursor: pointer;
}

button:hover {
    background: #ff9800;
    color: black;
}

ul {
    list-style: none;
    padding: 0;
}

li {
    background: #2b2b2b;
    margin: 10px 0;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ff9800;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

li span {
    flex: 1;
    margin-right: 10px;
}

.actions button {
    margin-left: 5px;
}

.delete-btn {
    border-color: red;
    color: red;
}

.delete-btn:hover {
    background: red;
    color: white;
}
</style>
</head>

<body>

<div class="home-btn">
    <a href="../index.html">Főoldal</a>
</div>

<div class="container">
    <h1>Könyvek kezelése</h1>

    <input type="text" id="title" placeholder="Cím">
    <input type="text" id="subject" placeholder="Tantárgy">
    <input type="text" id="publisher" placeholder="Kiadó">

    <br>
    <button id="saveBtn" onclick="saveBook()">Hozzáadás</button>

    <ul id="list"></ul>
</div>

<script>
const API = "http://nje.tankonyvrendeles.nhely.hu/api.php";

let editId = null;

function loadBooks() {
    axios.get(API)
        .then(res => {
            const list = document.getElementById("list");
            list.innerHTML = "";

            res.data.forEach(book => {
                const li = document.createElement("li");

                li.innerHTML = `
                    <span>
                        ${book.title} (${book.subject}) - ${book.publisher}
                    </span>
                    <div class="actions">
                        <button onclick="editBook(${book.id}, '${book.title}', '${book.subject}', '${book.publisher}')">✏️</button>
                        <button class="delete-btn" onclick="deleteBook(${book.id})">🗑️</button>
                    </div>
                `;

                list.appendChild(li);
            });
        });
}

function saveBook() {
    const title = document.getElementById("title").value;
    const subject = document.getElementById("subject").value;
    const publisher = document.getElementById("publisher").value;

    if (editId === null) {
        axios.post(API, { title, subject, publisher })
            .then(() => {
                loadBooks();
                clearForm();
            });
    } else {
        axios.put(API + "?id=" + editId, { title, subject, publisher })
            .then(() => {
                loadBooks();
                clearForm();
                editId = null;
                document.getElementById("saveBtn").innerText = "Hozzáadás";
            });
    }
}

function editBook(id, title, subject, publisher) {
    document.getElementById("title").value = title;
    document.getElementById("subject").value = subject;
    document.getElementById("publisher").value = publisher;

    editId = id;
    document.getElementById("saveBtn").innerText = "Mentés";
}

function deleteBook(id) {
    if (confirm("Biztos törlöd?")) {
        axios.delete(API + "?id=" + id)
            .then(() => loadBooks());
    }
}

function clearForm() {
    document.getElementById("title").value = "";
    document.getElementById("subject").value = "";
    document.getElementById("publisher").value = "";
}

loadBooks();
</script>

</body>
</html>
