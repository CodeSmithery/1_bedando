<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Axios CRUD</title>

<style>
body {
  background-color: #2c2f36;
  font-family: Arial;
}

.container {
  background: white;
  width: 600px;
  margin: 50px auto;
  padding: 20px;
  border-radius: 10px;
}

input {
  margin: 5px;
  padding: 8px;
}

button {
  margin: 5px;
  padding: 8px 12px;
  cursor: pointer;
}

ul {
  text-align: left;
}
</style>

</head>

<body>

<div id="app"></div>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<script type="text/babel">

const { useState, useEffect } = React;

const API = "http://nje.tankonyvrendeles.nhely.hu/api.php";

function App() {

  const [books, setBooks] = useState([]);
  const [title, setTitle] = useState("");
  const [subject, setSubject] = useState("");
  const [publisher, setPublisher] = useState("");

  function loadBooks() {
    axios.get(API)
      .then(res => setBooks(res.data))
      .catch(err => console.error(err));
  }

  useEffect(() => {
    loadBooks();
  }, []);

  function addBook() {
    axios.post(API, {
      title,
      subject,
      publisher
    })
    .then(() => {
      loadBooks();
      setTitle("");
      setSubject("");
      setPublisher("");
    });
  }

  function deleteBook(id) {
    axios.delete(API + "?id=" + id)
      .then(() => loadBooks());
  }

  return (
    <div className="container">
      <h2>Könyvek kezelése</h2>

      <div>
        <input
          placeholder="Cím"
          value={title}
          onChange={e => setTitle(e.target.value)}
        />
        <input
          placeholder="Tantárgy"
          value={subject}
          onChange={e => setSubject(e.target.value)}
        />
        <input
          placeholder="Kiadó"
          value={publisher}
          onChange={e => setPublisher(e.target.value)}
        />
        <button onClick={addBook}>Hozzáadás</button>
      </div>

      <ul>
        {books.map(b => (
          <li key={b.id}>
            {b.title} ({b.subject}) - {b.publisher}
            <button onClick={() => deleteBook(b.id)}>❌</button>
          </li>
        ))}
      </ul>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(<App />);

</script>

</body>
</html>
