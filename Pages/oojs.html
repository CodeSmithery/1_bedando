<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>OOJS - Diákok</title>

<style>
body {
  background: #2b2b2b;
  font-family: Arial, sans-serif;
  margin: 0;
  color: white;
}

.home-btn {
  text-align: center;
  margin-top: 20px;
}

.home-btn a {
  display: inline-block;
  padding: 12px 25px;
  border: 2px solid #ff9800;
  border-radius: 25px;
  color: #ff9800;
  text-decoration: none;
  font-size: 18px;
  transition: 0.3s;
}

.home-btn a:hover {
  background-color: #ff9800;
  color: black;
}

h1 {
  text-align: center;
  color: #ff9800;
  margin-top: 20px;
}

.search-box {
  text-align: center;
  margin: 20px;
}

.search-box input {
  padding: 10px;
  width: 250px;
  border-radius: 10px;
  border: 2px solid #ff9800;
  background: transparent;
  color: white;
}

.search-box input::placeholder {
  color: #ccc;
}

.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  padding: 20px;
}

.card {
  background: #3a3a3a;
  padding: 20px;
  border-radius: 15px;
  border: 2px solid #ff9800;
  text-align: center;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px rgba(255,152,0,0.5);
}

.card h3 {
  margin-bottom: 10px;
}

.card p {
  margin: 5px 0;
}
</style>

</head>

<body>

<script>

class Person {
  constructor(name, id) {
    this.name = name;
    this.id = id;
  }

  getName() {
    return this.name;
  }
}

class Student extends Person {
  constructor(name, id, className) {
    super(name, id);
    this.className = className;
  }

  render() {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h3>👤 ${this.getName()}</h3>
      <p>🎓 Osztály: ${this.className}</p>
    `;

    return div;
  }
}

class StudentList {
  constructor(students) {
    this.students = students;
    this.filtered = students;
  }

  render() {
    document.body.innerHTML = `
  <div class="home-btn">
    <a href="../index.html">Főoldal</a>
  </div>

  <h1>Diákok listája (OOP)</h1>

  <div class="search-box">
    <input type="text" placeholder="Keresés név alapján..." id="search">
  </div>

  <div class="container" id="list"></div>
`;

    this.renderList();

    document.getElementById("search").addEventListener("input", (e) => {
      const value = e.target.value.toLowerCase();

      this.filtered = this.students.filter(s =>
        s.name.toLowerCase().includes(value)
      );

      this.renderList();
    });
  }

  renderList() {
    const container = document.getElementById("list");
    container.innerHTML = "";

    this.filtered.forEach(student => {
      container.appendChild(student.render());
    });
  }
}

fetch("../data/txt/diak.txt")
  .then(res => res.text())
  .then(text => {

    const lines = text.split("\n").slice(1);

    const students = lines
      .filter(line => line.trim() !== "")
      .map(line => {
        const parts = line.split("\t");

        return new Student(
          parts[1],
          parts[0],
          parts[2]  
        );
      });

    const list = new StudentList(students);
    list.render();
  });

</script>

</body>
</html>
