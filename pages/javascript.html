<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Diákok kezelése</title>

<style>
body {
    background: #2b2b2b;
    font-family: Arial;
    margin: 0;
    color: white;
}

.home-btn {
    text-align: center;
    margin-top: 20px;
}

.home-btn a {
    display: inline-block;
    padding: 12px 25px;
    border: 2px solid #ff9800;
    border-radius: 25px;
    color: #ff9800;
    text-decoration: none;
    font-size: 18px;
}

.home-btn a:hover {
    background: #ff9800;
    color: black;
}

h1 {
    text-align: center;
    color: #ff9800;
    margin-top: 20px;
}

.container {
    width: 90%;
    max-width: 800px;
    margin: 30px auto;
    background: #3a3a3a;
    padding: 20px;
    border-radius: 15px;
    border: 2px solid #ff9800;
}

input {
    width: 90%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 10px;
    border: 2px solid #ff9800;
    background: transparent;
    color: white;
}

button {
    padding: 10px 20px;
    margin-top: 10px;
    border-radius: 10px;
    border: 2px solid #ff9800;
    background: transparent;
    color: #ff9800;
    cursor: pointer;
}

button:hover {
    background: #ff9800;
    color: black;
}

ul {
    list-style: none;
    padding: 0;
}

li {
    background: #2b2b2b;
    margin: 10px 0;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #ff9800;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.actions button {
    margin-left: 5px;
}

.delete-btn {
    border-color: red;
    color: red;
}

.delete-btn:hover {
    background: red;
    color: white;
}
</style>

</head>
<body>

<div class="home-btn">
    <a href="../index.html">Főoldal</a>
</div>

<h1>Diákok kezelése</h1>

<div class="container">

    <input id="newName" placeholder="Név">
    <input id="newClass" placeholder="Osztály">
    <button onclick="addStudent()">Hozzáadás</button>

    <ul id="lista"></ul>

</div>

<script>

let students = [];

function loadData() {
    fetch("../data/txt/diak.txt")
        .then(res => res.text())
        .then(text => {
            const lines = text.split("\n").slice(1);

            students = lines
                .filter(line => line.trim() !== "")
                .map(line => {
                    const parts = line.trim().split(/\s+/);

                    return {
                        name: parts[1] + " " + parts[2],
                        class: parts[3]
                    };
                });

            render();
        });
}

function addStudent() {
    let name = document.getElementById("newName").value;
    let className = document.getElementById("newClass").value;

    if (!name || !className) {
        alert("Kérlek tölts ki minden mezőt!");
        return;
    }

    students.push({ name, class: className });

    document.getElementById("newName").value = "";
    document.getElementById("newClass").value = "";

    render();
}

function render() {
    let list = document.getElementById("lista");
    list.innerHTML = "";

    if (students.length === 0) {
        list.innerHTML = "<li>Nincs adat</li>";
        return;
    }

    students.forEach((d, index) => {
        list.innerHTML += `
            <li>
                <span>${d.name} (${d.class})</span>
                <div class="actions">
                    <button onclick="editStudent(${index})">✏️</button>
                    <button class="delete-btn" onclick="deleteStudent(${index})">🗑️</button>
                </div>
            </li>
        `;
    });
}

function deleteStudent(index) {
    students.splice(index, 1);
    render();
}

function editStudent(index) {
    let newName = prompt("Új név:", students[index].name);
    let newClass = prompt("Új osztály:", students[index].class);

    if (newName && newClass) {
        students[index].name = newName;
        students[index].class = newClass;
        render();
    }
}

loadData();

</script>

</body>
</html>
