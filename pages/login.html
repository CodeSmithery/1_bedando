<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Teacher Login</title>
    <link rel="stylesheet" href="/Styles/textstyles.css">
<style>
        body{
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        header, footer {
        padding: 10px;
        text-align: center;
        }

        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center; 
        }
    </style>
</head>
<body>

<div>
    <div style="display: flex; flex-direction: column; align-items: center;">
        <h2 class="login-text" id="loginTitle">Teacher Login</h2>
        <div class="login-container">
            <div>
                <img src="/images/user_silhuette.png" alt="User Icon" style="width: 80px; height: 80px;">
            </div>
            <div>
                <div>
                    <label for="username">Username:</label>
                    <input id="username" placeholder="Username" class ="id-input">
                </div>
                <div>
                    <label for="password">Password:</label>
                    <input id="password" type="password" placeholder="Password" class ="id-input">
                </div>
                <div>
                    <button style="margin-top: 5px;" onclick="login()">Login</button> 
                </div>
                <div>
                    <p id="error" style="color:red;"></p>
                </div>
            </div>
        </div>
    </div>
        <div style="display: flex;" position="relative" top="0px">
            <a href="/Pages/index.html" style="margin: 70px;">Student Login</a>
        </div>
</div>

<script src="/Scripts/script.js"></script>

</body>
</html>
