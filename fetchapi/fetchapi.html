<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fetch API – Diák CRUD</title>

    <link rel="stylesheet" href="style.css">
</head>

<body class="main">

    <h1>Diákok kezelése (CRUD)</h1>

    <!-- ŰRLAP HOZZÁADÁSHOZ / MÓDOSÍTÁSHOZ -->
    <form id="diakForm" class="form-container">

        <div class="form-row">
            <label for="az">Azonosító:</label>
            <input type="number" id="az" required>
        </div>

        <div class="form-row">
            <label for="nev">Név:</label>
            <input type="text" id="nev" required>
        </div>

        <div class="form-row">
            <label for="osztaly">Osztály:</label>
            <input type="text" id="osztaly" required>
        </div>

        <button id="submitBtn" class="btn-primary">Hozzáadás</button>
    </form>


    <!-- LISTA / TÁBLÁZAT -->
    <table class="data-table">
        <thead>
            <tr>
                <th>Az</th>
                <th>Név</th>
                <th>Osztály</th>
                <th>Műveletek</th>
            </tr>
        </thead>

        <tbody id="diakTableBody">
            <!-- JS tölti be -->
        </tbody>
    </table>

    <script src="script.js"></script>
</body>
</html>
